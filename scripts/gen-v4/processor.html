<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"><title>v4 processor</title></head>
<body style="background:#222;color:#ddd;font-family:monospace"><p id="status">processing…</p>
<script>
/* =========================================================================
 * gen-v4/processor.html — 把 gpt-image-2 v4 源圖切成精確 frame atlas + JSON。
 * 與 v3 相同的自適應去背 + 多步高品質縮放 + 引導式最小值切割；新增：
 *   1) sliceActions：把 actions-a(12 列) + actions-b(12 列) 合併成單一 24 列 atlas，
 *      讓四向動作（water/hoe/sow/harvest/idle/collect/build/use × down/up/side）同一張。
 *   2) sliceLoose：對「鬆散非規則排版」的 structures-nature 用連通元件抽取 + 鄰近合併，
 *      依閱讀順序命名（oak/pine/.../scarecrow），保留真實長寬比（高物件可向上遮擋）。
 *   3) genTerrain：沿用 v3 程序化 autotile（gpt 地形非規則，無法可靠切片）。
 * 由 process-v4-atlas.js（playwright）驅動，結果掛在 window.__v4。
 * ========================================================================= */
const SRC = "../../assets/generated/v4/source/";
function loadImg(src){return new Promise((res)=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;});}
function cv(w,h){const c=document.createElement("canvas");c.width=w;c.height=h;return c;}
function rect(x,c,X,Y,W,H){x.fillStyle=c;x.fillRect(X,Y,W,H);}
function px(x,X,Y,c){x.fillStyle=c;x.fillRect(X,Y,1,1);}
function rng(s){s>>>=0;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
function median(a){if(!a.length)return 1;const s=a.slice().sort((p,q)=>p-q);return s[s.length>>1];}

/* ---- 自適應去背：移除 gpt 棋盤格 / 純色背景（同 v3）---- */
function debg(ctx,w,h){
  const d=ctx.getImageData(0,0,w,h),p=d.data;
  const seeds=[];
  for(const [cx,cy] of [[0,0],[w-1,0],[0,h-1],[w-1,h-1],[w>>1,0],[w>>1,h-1]]){
    const i=(cy*w+cx)*4;seeds.push([p[i],p[i+1],p[i+2]]);
  }
  const isBg=(k)=>{
    const r=p[k],g=p[k+1],b=p[k+2],mx=Math.max(r,g,b),mn=Math.min(r,g,b),sat=mx-mn;
    if(mx>=180&&sat<=24)return true;                    // 棋盤格兩色 + 接縫灰：亮且近灰
    if(mx>=92&&mx<=178&&sat<=16)return true;            // 接地陰影：中灰低飽和
    for(const s of seeds){if(Math.abs(r-s[0])<=18&&Math.abs(g-s[1])<=18&&Math.abs(b-s[2])<=18)return true;}
    return false;
  };
  const vis=new Uint8Array(w*h),st=[];
  for(let x=0;x<w;x++){st.push(x);st.push((h-1)*w+x);}
  for(let y=0;y<h;y++){st.push(y*w);st.push(y*w+w-1);}
  while(st.length){const i=st.pop();if(vis[i])continue;vis[i]=1;
    if(!isBg(i*4))continue;p[i*4+3]=0;
    const x=i%w,y=(i/w)|0;
    if(x>0)st.push(i-1);if(x<w-1)st.push(i+1);if(y>0)st.push(i-w);if(y<h-1)st.push(i+w);}
  ctx.putImageData(d,0,0);
}

// 多步高品質縮放（大幅縮小時逐次減半，避免鋸齒/糊化）
function downscale(srcCanvas,sx,sy,sw,sh,dw,dh){
  let cur=cv(sw,sh),cx=cur.getContext("2d");
  cx.imageSmoothingEnabled=true;cx.imageSmoothingQuality="high";
  cx.drawImage(srcCanvas,sx,sy,sw,sh,0,0,sw,sh);
  let cw=sw,ch=sh;
  while(cw>dw*2&&ch>dh*2){
    const nW=Math.max(dw,cw>>1),nH=Math.max(dh,ch>>1),nx=cv(nW,nH),ncx=nx.getContext("2d");
    ncx.imageSmoothingEnabled=true;ncx.imageSmoothingQuality="high";
    ncx.drawImage(cur,0,0,cw,ch,0,0,nW,nH);cur=nx;cw=nW;ch=nH;
  }
  const fin=cv(dw,dh),fcx=fin.getContext("2d");
  fcx.imageSmoothingEnabled=true;fcx.imageSmoothingQuality="high";
  fcx.drawImage(cur,0,0,cw,ch,0,0,dw,dh);
  return fin;
}

/* 引導式最小值切割（同 v3）：已知段數 n + 概略 pitch，在每個名目邊界附近窗口找最空位置下刀。*/
function guidedCuts(proj,total,n){
  const pitch=total/n,cuts=[0],win=Math.round(pitch*0.42);
  for(let i=1;i<n;i++){
    const center=Math.round(i*pitch),lo=Math.max(1,center-win),hi=Math.min(total-1,center+win);
    let best=center,bestv=Infinity;
    for(let y=lo;y<=hi;y++)if(proj[y]<bestv){bestv=proj[y];best=y;}
    cuts.push(best);
  }
  cuts.push(total);return cuts;
}

/* 內容帶偵測：直接找「投影 > 門檻」的連續內容帶，合併/拆分到剛好 n 段，
 * 切點落在相鄰帶之間的間隙中點。對 gpt 不規則行距穩健（切點不會落在空隙列上，
 * 避免整列空白幀）。內容帶過少（行相黏）時退化為均分；無內容退化為 guidedCuts。*/
function findBands(proj,total,n){
  let maxP=0;for(let i=0;i<total;i++)if(proj[i]>maxP)maxP=proj[i];
  if(maxP<=0)return guidedCuts(proj,total,n);
  const thr=Math.max(2,maxP*0.05);
  let segs=[],s=-1;
  for(let i=0;i<total;i++){
    if(proj[i]>thr){if(s<0)s=i;}
    else if(s>=0){segs.push({a:s,b:i-1});s=-1;}
  }
  if(s>=0)segs.push({a:s,b:total-1});
  if(!segs.length)return guidedCuts(proj,total,n);
  // 內容帶過多（角色內部空隙誤切）→ 反覆併掉最小間隙
  while(segs.length>n){
    let mi=0,mg=Infinity;
    for(let i=0;i<segs.length-1;i++){const g=segs[i+1].a-segs[i].b;if(g<mg){mg=g;mi=i;}}
    segs[mi]={a:segs[mi].a,b:segs[mi+1].b};segs.splice(mi+1,1);
  }
  // 內容帶過少（相黏）→ 反覆均分最高的帶
  while(segs.length<n){
    let mi=0,mh=-1;
    for(let i=0;i<segs.length;i++){const h=segs[i].b-segs[i].a;if(h>mh){mh=h;mi=i;}}
    const {a,b}=segs[mi],mid=(a+b)>>1;
    segs.splice(mi,1,{a,b:mid},{a:mid+1,b});
  }
  const cuts=[0];
  for(let i=0;i<n-1;i++)cuts.push(Math.round((segs[i].b+segs[i+1].a)/2));
  cuts.push(total);return cuts;
}

// 把源圖去背後回傳暫存 canvas
async function prep(file){
  const img=await loadImg(SRC+file); if(!img)return null;
  const sw=img.naturalWidth,sh=img.naturalHeight;
  const tmp=cv(sw,sh),tx=tmp.getContext("2d");tx.drawImage(img,0,0);
  debg(tx,sw,sh);
  (window.__dbg=window.__dbg||{})[file]=tmp.toDataURL("image/png");
  return {tmp,sw,sh,data:tx.getImageData(0,0,sw,sh).data};
}

/* 規則網格切割核心：把已去背的 tmp（cols×rows 名目格）切到 ox 輸出（rowBase 起的列），
 * 緊緻 bbox + 取最大垂直內容塊 + 全列中位數定 scale → 同列大小一致；mode baseline/center。*/
function sliceInto(prepped,cols,rows,fw,fh,frameIdFn,anchor,mode,ox,frames,rowBase,opts){
  opts=opts||{};
  const fill=opts.fill!=null?opts.fill:(mode==="center"?0.82:0.96);  // 高度填充上限（留 padding）
  const wfill=opts.wfill!=null?opts.wfill:(mode==="center"?0.82:0.9); // 寬度填充上限
  const {tmp,sw,sh,data}=prepped;
  const A=(x,y)=>data[(y*sw+x)*4+3]>24;
  const rowP=new Array(sh).fill(0);
  for(let y=0;y<sh;y++){let n=0;for(let x=0;x<sw;x++)if(A(x,y))n++;rowP[y]=n;}
  const yCuts=findBands(rowP,sh,rows);
  const baseY=Math.round(anchor[1]*fh);
  for(let r=0;r<rows;r++){
    const y0=yCuts[r],y1=yCuts[r+1];
    const colP=new Array(sw).fill(0);
    for(let y=y0;y<y1;y++)for(let x=0;x<sw;x++)if(A(x,y))colP[x]++;
    const xCuts=findBands(colP,sw,cols);
    const cells=[];const hs=[],ws=[];
    for(let c=0;c<cols;c++){
      const x0=xCuts[c],x1=xCuts[c+1];
      const rc=[];for(let y=y0;y<y1;y++){let n=0;for(let x=x0;x<x1;x++)if(A(x,y))n++;rc.push(n);}
      const runs=[];let s=-1,sum=0;
      for(let i=0;i<rc.length;i++){
        if(rc[i]>2){if(s<0){s=i;sum=0;}sum+=rc[i];}
        else if(s>=0){runs.push({s,e:i-1,sum});s=-1;}
      }
      if(s>=0)runs.push({s,e:rc.length-1,sum});
      if(!runs.length){cells.push(null);continue;}
      let dom=runs[0];for(const r2 of runs)if(r2.sum>dom.sum)dom=r2;
      let lo=dom.s,hi=dom.e,changed=true;
      while(changed){changed=false;for(const r2 of runs){
        if(r2.e<lo&&lo-r2.e<=14){lo=r2.s;changed=true;}
        else if(r2.s>hi&&r2.s-hi<=14){hi=r2.e;changed=true;}
      }}
      const by0=y0+lo,by1=y0+hi;
      let minx=x1,miny=by1,maxx=x0-1,maxy=by0,found=false;
      for(let y=by0;y<=by1;y++)for(let x=x0;x<x1;x++)if(A(x,y)){found=true;if(x<minx)minx=x;if(x>maxx)maxx=x;if(y<miny)miny=y;if(y>maxy)maxy=y;}
      cells.push(found?{minx,miny,bw:maxx-minx+1,bh:maxy-miny+1}:null);
      if(found){hs.push(maxy-miny+1);ws.push(maxx-minx+1);}
    }
    const medH=median(hs),medW=median(ws);
    let rowScale=mode==="center"?Math.min(fw*wfill/medW,fh*fill/medH):Math.min(fw*wfill/medW,(baseY*fill)/medH);
    if(rowScale>1)rowScale=1;
    const R=rowBase+r;
    // 每格上限：同列共用 rowScale 保持一致，但個別「比中位數大很多」的格（如作物 ready 階段）
    // 額外 clamp 到格內可用範圍，確保留 padding 不觸邊/不裁切（角色幀≈中位數，不受影響）。
    const maxW=fw*wfill,maxH=mode==="center"?fh*fill:(baseY-3);
    for(let c=0;c<cols;c++){
      const fid=frameIdFn(r,c),cell=cells[c];
      if(!cell){frames[fid]={x:c*fw,y:R*fh,w:fw,h:fh,anchor,empty:true};continue;}
      let dw=Math.max(1,Math.round(cell.bw*rowScale)),dh=Math.max(1,Math.round(cell.bh*rowScale));
      let s2=1;if(dh>maxH)s2=Math.min(s2,maxH/dh);if(dw>maxW)s2=Math.min(s2,maxW/dw);
      if(s2<1){dw=Math.max(1,Math.round(dw*s2));dh=Math.max(1,Math.round(dh*s2));}
      const dx=c*fw+Math.round((fw-dw)/2);
      const dy=mode==="center"?R*fh+Math.round((fh-dh)/2):R*fh+baseY-dh;
      ox.drawImage(downscale(tmp,cell.minx,cell.miny,cell.bw,cell.bh,dw,dh),dx,dy);
      frames[fid]={x:c*fw,y:R*fh,w:fw,h:fh,anchor};
    }
  }
}

// 單張規則網格 → 自有輸出 atlas
async function sliceGrid(file,cols,rows,fw,fh,frameIdFn,anchor,mode,opts){
  const p=await prep(file); if(!p)return null;
  const out=cv(fw*cols,fh*rows),ox=out.getContext("2d");const frames={};
  sliceInto(p,cols,rows,fw,fh,frameIdFn,anchor,mode,ox,frames,0,opts);
  return {png:out.toDataURL("image/png"),frames,meta:{w:fw*cols,h:fh*rows,frameW:fw,frameH:fh,cols,rows}};
}

// 兩張同寬 12 列動作圖 → 合併 24 列單一 atlas
async function sliceActions(fileA,rowsA,fileB,rowsB,fw,fh,anchor){
  const pA=await prep(fileA),pB=await prep(fileB);
  if(!pA||!pB)return null;
  const cols=6,total=rowsA.length+rowsB.length;
  const out=cv(fw*cols,fh*total),ox=out.getContext("2d");const frames={};
  const fid=(rows,off)=>(r,c)=>rows[r]+"_"+String(c).padStart(2,"0");
  sliceInto(pA,cols,rowsA.length,fw,fh,fid(rowsA,0),anchor,"baseline",ox,frames,0);
  sliceInto(pB,cols,rowsB.length,fw,fh,fid(rowsB,0),anchor,"baseline",ox,frames,rowsA.length);
  return {png:out.toDataURL("image/png"),frames,meta:{w:fw*cols,h:fh*total,frameW:fw,frameH:fh,cols,rows:total}};
}

/* ---- 鬆散物件抽取（structures-nature）：連通元件 + 鄰近合併 + 閱讀順序命名 ----
 * gpt 把多個高度/寬度不一的物件散放在非規則網格，固定網格切割會切壞寬物件。
 * 改用 alpha 連通元件找出每個物件的 bbox，合併鄰近碎塊（樹葉/燈光暈），
 * 依「列帶→由左到右」排序對應 names，輸出時保留各自真實長寬比（高物件可向上遮擋）。*/
async function sliceLoose(file,names,anchor,capPx){
  const p=await prep(file); if(!p)return null;
  const {tmp,sw,sh,data}=p;
  const A=new Uint8Array(sw*sh);
  for(let i=0;i<sw*sh;i++)A[i]=data[i*4+3]>40?1:0;
  // 連通元件（8 鄰）
  const lbl=new Int32Array(sw*sh).fill(0);let next=0;const boxes=[];
  const stack=[];
  for(let i=0;i<sw*sh;i++){
    if(!A[i]||lbl[i])continue;
    next++;let minx=sw,miny=sh,maxx=0,maxy=0,area=0;
    stack.push(i);lbl[i]=next;
    while(stack.length){
      const k=stack.pop();const x=k%sw,y=(k/sw)|0;area++;
      if(x<minx)minx=x;if(x>maxx)maxx=x;if(y<miny)miny=y;if(y>maxy)maxy=y;
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy)continue;const nx=x+dx,ny=y+dy;
        if(nx<0||ny<0||nx>=sw||ny>=sh)continue;
        const nk=ny*sw+nx;if(A[nk]&&!lbl[nk]){lbl[nk]=next;stack.push(nk);}
      }
    }
    boxes.push({minx,miny,maxx,maxy,area});
  }
  // 丟極小雜訊
  const minArea=Math.max(120,(sw*sh)*0.0006);
  let bs=boxes.filter(b=>b.area>=minArea);
  // 鄰近合併（bbox 互相外擴 gap 後相交即併）— 重聚同一物件的分離碎塊
  const gap=Math.round(Math.min(sw,sh)*0.018);
  const near=(a,b)=>!(a.maxx+gap<b.minx||b.maxx+gap<a.minx||a.maxy+gap<b.miny||b.maxy+gap<a.miny);
  let merged=true;
  while(merged){merged=false;
    outer:for(let i=0;i<bs.length;i++)for(let j=i+1;j<bs.length;j++){
      if(near(bs[i],bs[j])){
        bs[i]={minx:Math.min(bs[i].minx,bs[j].minx),miny:Math.min(bs[i].miny,bs[j].miny),
               maxx:Math.max(bs[i].maxx,bs[j].maxx),maxy:Math.max(bs[i].maxy,bs[j].maxy),
               area:bs[i].area+bs[j].area};
        bs.splice(j,1);merged=true;break outer;
      }
    }
  }
  // 排序成閱讀順序：依 y 中心分列帶，帶內由左到右
  for(const b of bs){b.cx=(b.minx+b.maxx)/2;b.cy=(b.miny+b.maxy)/2;b.h=b.maxy-b.miny+1;b.w=b.maxx-b.minx+1;}
  const medH=median(bs.map(b=>b.h));
  bs.sort((a,b)=>a.cy-b.cy);
  const bands=[];let cur=[];let lastCy=-1e9;
  for(const b of bs){
    if(cur.length&&b.cy-lastCy>medH*0.55){bands.push(cur);cur=[];}
    cur.push(b);lastCy=b.cy;
  }
  if(cur.length)bands.push(cur);
  const ordered=[];for(const band of bands){band.sort((a,b)=>a.cx-b.cx);ordered.push(...band);}
  if(ordered.length!==names.length)
    console.warn("sliceLoose "+file+"：抽到 "+ordered.length+" 物件，預期 "+names.length+"（多餘者命名 extra_n）");
  // 計算各自縮放尺寸（不放大）
  const items=ordered.map((b,idx)=>{
    const w=b.w,h=b.h,scale=Math.min(1,capPx/Math.max(w,h));
    return {b,name:names[idx]||("extra_"+idx),dw:Math.max(1,Math.round(w*scale)),dh:Math.max(1,Math.round(h*scale))};
  });
  // shelf packing（atlasWidth 1024，pad 4）
  const pad=4,AW=1024;let cx2=pad,cy2=pad,rowH=0,maxX=0;const placed=[];
  for(const it of items){
    if(cx2+it.dw+pad>AW){cx2=pad;cy2+=rowH+pad;rowH=0;}
    placed.push({...it,x:cx2,y:cy2});
    cx2+=it.dw+pad;rowH=Math.max(rowH,it.dh);maxX=Math.max(maxX,cx2);
  }
  const AH=cy2+rowH+pad;
  const out=cv(AW,AH),ox=out.getContext("2d");const frames={};
  for(const it of placed){
    ox.drawImage(downscale(tmp,it.b.minx,it.b.miny,it.b.w,it.b.h,it.dw,it.dh),it.x,it.y);
    frames[it.name]={x:it.x,y:it.y,w:it.dw,h:it.dh,anchor};
  }
  return {png:out.toDataURL("image/png"),frames,meta:{w:AW,h:AH,frameW:0,frameH:0,cols:0,rows:bands.length}};
}

// ---- 程序化 autotile 地形 512×512 / 32px（沿用 v3）----
function genTerrain(){
  const c=cv(512,512),x=c.getContext("2d");x.imageSmoothingEnabled=false;
  const frames={};let col=0,row=0;
  const put=(id,draw,extra)=>{const X=col*32,Y=row*32;draw(X,Y);frames[id]=Object.assign({x:X,y:Y,w:32,h:32,anchor:[0.5,0.5]},extra||{});col++;if(col>=16){col=0;row++;}};
  const r=rng(7);
  const grassBase=(X,Y,seed)=>{const g=rng(seed||1);rect(x,"#79bd46",X,Y,32,32);
    for(let i=0;i<70;i++){const c=["#6cae3a","#86cb52","#71b23f","#5f9c33"][g()*4|0];px(x,X+(g()*32|0),Y+(g()*32|0),c);}
    rect(x,"rgba(40,80,30,0.10)",X,Y+27,32,5);};
  for(let i=1;i<=4;i++)put("grass_center_0"+i,(X,Y)=>grassBase(X,Y,10+i));
  put("grass_flower_01",(X,Y)=>{grassBase(X,Y,21);for(let k=0;k<5;k++){const fx=X+5+(r()*22|0),fy=Y+5+(r()*20|0),cc=["#ff7aa8","#ffd34d","#b07ae0","#fff"][r()*4|0];px(x,fx,fy,cc);px(x,fx,fy-1,cc);px(x,fx+1,fy,cc);}});
  put("grass_flower_02",(X,Y)=>{grassBase(X,Y,22);for(let k=0;k<8;k++){const fx=X+4+(r()*24|0),fy=Y+4+(r()*22|0);px(x,fx,fy,"#fff");px(x,fx,fy-1,"#ffe9a8");}});
  put("grass_clump_01",(X,Y)=>{grassBase(X,Y,23);for(let k=0;k<16;k++){const bx=X+4+(r()*24|0),by=Y+29-(r()*3|0),h=4+(r()*6|0);rect(x,r()<.5?"#4f8a2c":"#86cb52",bx,by-h,1,h);}});
  const path=(X,Y)=>{rect(x,"#cda86a",X,Y,32,32);for(let i=0;i<26;i++)px(x,X+(r()*32|0),Y+(r()*32|0),["#b8964f","#dcc088","#c09a5a"][r()*3|0]);
    for(let i=0;i<5;i++)px(x,X+(r()*32|0),Y+(r()*32|0),"#8a6f42");};
  const ge=(X,Y,s)=>{const e="#69ab39";if(s.includes("n")){rect(x,e,X,Y,32,3);for(let i=0;i<10;i++)px(x,X+(r()*32|0),Y+3,"#79bd46");}
    if(s.includes("s")){rect(x,e,X,Y+29,32,3);for(let i=0;i<10;i++)px(x,X+(r()*32|0),Y+28,"#79bd46");}
    if(s.includes("w")){rect(x,e,X,Y,3,32);for(let i=0;i<10;i++)px(x,X+3,Y+(r()*32|0),"#79bd46");}
    if(s.includes("e")){rect(x,e,X+29,Y,3,32);for(let i=0;i<10;i++)px(x,X+28,Y+(r()*32|0),"#79bd46");}};
  put("path_c",(X,Y)=>path(X,Y));
  ["n","s","e","w"].forEach(d=>put("path_"+d,(X,Y)=>{path(X,Y);ge(X,Y,[d]);}));
  [["ne","n","e"],["nw","n","w"],["se","s","e"],["sw","s","w"]].forEach(([id,a,b])=>put("path_"+id,(X,Y)=>{path(X,Y);ge(X,Y,[a,b]);}));
  const soil=(X,Y,base,spk,furrow)=>{rect(x,base,X,Y,32,32);
    for(let i=0;i<30;i++)px(x,X+(r()*32|0),Y+(r()*32|0),spk[r()*spk.length|0]);
    if(furrow)for(let fy=Y+5;fy<Y+30;fy+=7)rect(x,"rgba(0,0,0,0.10)",X+2,fy,28,2);};
  put("soil_dry_c",(X,Y)=>soil(X,Y,"#ad7c4d",["#8c5f37","#c08f5c","#9c6e44"],true));
  ["n","s","e","w"].forEach(d=>put("soil_dry_"+d,(X,Y)=>{soil(X,Y,"#ad7c4d",["#8c5f37","#9c6e44"],true);ge(X,Y,[d]);}));
  [["ne","n","e"],["nw","n","w"],["se","s","e"],["sw","s","w"]].forEach(([id,a,b])=>put("soil_dry_"+id,(X,Y)=>{soil(X,Y,"#ad7c4d",["#8c5f37"],true);ge(X,Y,[a,b]);}));
  put("soil_wet_c",(X,Y)=>soil(X,Y,"#6f4a2b","#553a22 #3f2e1c #5a3d24".split(" "),true));
  ["n","s","e","w"].forEach(d=>put("soil_wet_"+d,(X,Y)=>{soil(X,Y,"#6f4a2b","#553a22 #3f2e1c".split(" "),true);ge(X,Y,[d]);}));
  [["ne","n","e"],["nw","n","w"],["se","s","e"],["sw","s","w"]].forEach(([id,a,b])=>put("soil_wet_"+id,(X,Y)=>{soil(X,Y,"#6f4a2b","#553a22".split(" "),true);ge(X,Y,[a,b]);}));
  const water=(X,Y)=>{rect(x,"#3f8fcf",X,Y,32,32);
    for(let i=0;i<12;i++)rect(x,"#5fa9e0",X+(r()*24|0),Y+(r()*32|0),4+(r()*4|0),1);
    for(let i=0;i<6;i++)rect(x,"#2f7ab5",X+(r()*28|0),Y+(r()*32|0),3,1);};
  const bank=(X,Y,s)=>{const k="#b8b0a2";if(s.includes("n"))rect(x,k,X,Y,32,5);if(s.includes("s"))rect(x,k,X,Y+27,32,5);
    if(s.includes("w"))rect(x,k,X,Y,5,32);if(s.includes("e"))rect(x,k,X+27,Y,5,32);};
  put("water_c",(X,Y)=>{water(X,Y);if(r()<.5)rect(x,"#6fc26a",X+12,Y+13,3,2);});
  ["n","s","e","w"].forEach(d=>put("water_"+d,(X,Y)=>{water(X,Y);bank(X,Y,[d]);}));
  [["ne","n","e"],["nw","n","w"],["se","s","e"],["sw","s","w"]].forEach(([id,a,b])=>put("water_"+id,(X,Y)=>{water(X,Y);bank(X,Y,[a,b]);}));
  put("bridge_h",(X,Y)=>{rect(x,"#9c6b3a",X,Y,32,32);for(let i=0;i<32;i+=5)rect(x,"#7c5530",X,Y+i,32,1);rect(x,"#b98a52",X,Y,32,2);rect(x,"#b98a52",X,Y+30,32,2);});
  put("bridge_v",(X,Y)=>{rect(x,"#9c6b3a",X,Y,32,32);for(let i=0;i<32;i+=5)rect(x,"#7c5530",X+i,Y,1,32);rect(x,"#b98a52",X,Y,2,32);rect(x,"#b98a52",X+30,Y,2,32);});
  const ovl=(id,draw)=>put(id,draw,{overlay:true});
  ovl("overlay_flowers_01",(X,Y)=>{for(let k=0;k<6;k++){const fx=X+4+(r()*24|0),fy=Y+4+(r()*22|0),cc=["#ff7aa8","#ffd34d","#b07ae0"][r()*3|0];px(x,fx,fy,cc);px(x,fx,fy-1,"#fff");}});
  ovl("overlay_pebbles_01",(X,Y)=>{for(let k=0;k<5;k++){const fx=X+5+(r()*22|0),fy=Y+5+(r()*22|0);px(x,fx,fy,"#9aa3ab");px(x,fx+1,fy,"#b8c0c6");px(x,fx,fy+1,"#7e858c");}});
  ovl("overlay_grass_clump_01",(X,Y)=>{for(let k=0;k<10;k++){const bx=X+9+(r()*14|0),by=Y+27,h=4+(r()*5|0);rect(x,"#4f8a2c",bx,by-h,1,h);}});

  return {png:c.toDataURL("image/png"),frames,meta:{w:512,h:512,frameW:32,frameH:32,cols:16,rows:16}};
}

// ---- R47：程序化像素 sheet（透明背景、全像素不抗鋸齒，alpha 僅 0/255）----
function genCrops2(){
  const cols=5,rows=4,fw=48,fh=48,anchor=[0.5,0.9];
  const c=cv(cols*fw,rows*fh),x=c.getContext("2d");x.imageSmoothingEnabled=false;
  const frames={}, cropRows=["bell_pepper","potato","grapes","melon"], stageCols=["seed","sprout","young","mature","ready"];
  const putFrame=(r,col,draw)=>{const X=col*fw,Y=r*fh;draw(X,Y);frames[cropRows[r]+"_"+stageCols[col]]={x:X,y:Y,w:fw,h:fh,anchor};};
  const soil=(X,Y,w)=>{rect(x,"#6f4a2b",X+24-(w>>1),Y+39,w,3);rect(x,"#553a22",X+25-(w>>1),Y+41,w-2,1);};
  const leaf=(X,Y,dx,dy,w,h,c1)=>{rect(x,c1,X+24+dx,Y+36-dy,w,h);rect(x,"#3e7d32",X+24+dx,Y+36-dy+h-1,w,1);};
  const stem=(X,Y,h)=>rect(x,"#4f8a2c",X+23,Y+38-h,3,h);
  const seed=(X,Y,c1)=>{soil(X,Y,12);rect(x,c1,X+22,Y+35,5,4);rect(x,"#f1d38a",X+23,Y+34,3,1);};
  const sprout=(X,Y)=>{soil(X,Y,15);stem(X,Y,9);leaf(X,Y,-8,10,7,4,"#77b94a");leaf(X,Y,3,12,8,4,"#8bcb56");};
  const young=(X,Y)=>{soil(X,Y,20);stem(X,Y,17);leaf(X,Y,-13,19,11,5,"#6eae43");leaf(X,Y,3,22,12,5,"#89c957");leaf(X,Y,-5,13,10,4,"#5f9c33");};
  const mature=(X,Y)=>{soil(X,Y,25);stem(X,Y,25);leaf(X,Y,-17,26,15,6,"#5f9c33");leaf(X,Y,2,29,17,6,"#86cb52");leaf(X,Y,-10,20,14,5,"#6eae43");leaf(X,Y,6,17,12,5,"#75b94b");};
  for(let r=0;r<rows;r++){
    putFrame(r,0,(X,Y)=>seed(X,Y,["#d94d38","#9b7344","#6e4aa8","#c9d66a"][r]));
    putFrame(r,1,sprout);
    putFrame(r,2,young);
    putFrame(r,3,(X,Y)=>{mature(X,Y); if(r===2){rect(x,"#7348a8",X+18,Y+24,4,4);rect(x,"#5f358d",X+22,Y+27,4,4);} if(r===3){rect(x,"#6faa42",X+17,Y+30,9,6);rect(x,"#d8ed8a",X+19,Y+31,2,2);}});
    putFrame(r,4,(X,Y)=>{
      mature(X,Y);
      if(r===0){
        rect(x,"#d94d38",X+18,Y+24,8,10);rect(x,"#b9382d",X+18,Y+31,8,4);rect(x,"#f06b45",X+20,Y+25,3,3);
        rect(x,"#f0c64e",X+28,Y+27,7,9);rect(x,"#c99b35",X+28,Y+33,7,3);rect(x,"#fff0a0",X+29,Y+28,2,2);
      } else if(r===1){
        rect(x,"#b9834b",X+15,Y+34,9,6);rect(x,"#8d6338",X+16,Y+39,7,2);rect(x,"#dfbd83",X+18,Y+35,2,1);
        rect(x,"#c08a54",X+27,Y+32,8,7);rect(x,"#8d6338",X+29,Y+38,5,2);rect(x,"#e0c18b",X+29,Y+33,2,1);
      } else if(r===2){
        const pts=[[16,24],[20,24],[24,25],[18,28],[22,29],[26,30],[20,33],[24,34]];
        for(const [gx,gy] of pts){rect(x,"#7042a0",X+gx,Y+gy,5,5);rect(x,"#b891d8",X+gx+1,Y+gy+1,1,1);}
        rect(x,"#684225",X+18,Y+20,15,2);
      } else {
        rect(x,"#8fcf6a",X+14,Y+28,19,12);rect(x,"#5f9d45",X+15,Y+36,17,3);rect(x,"#d8ed8a",X+19,Y+30,5,3);
        rect(x,"#6faa42",X+16,Y+32,16,1);rect(x,"#6faa42",X+18,Y+35,13,1);
      }
    });
  }
  return {png:c.toDataURL("image/png"),frames,meta:{w:cols*fw,h:rows*fh,frameW:fw,frameH:fh,cols,rows}};
}
