name: CI & Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: 測試（經濟 + UI 煙霧 + JSON）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: 經濟與進度模擬測試
        run: node scripts/test-economy.js
      - name: MVP2 系統測試（地圖/動物/建築/產品訂單）
        run: node scripts/test-systems.js
      - name: UI 煙霧測試（mock DOM）
        run: node scripts/test-ui-smoke.js
      - name: 驗證 v3 atlas（props/vfx 沿用來源：尺寸/必要 frame/錨點）
        run: node scripts/validate-v3-atlas.js
      - name: 驗證 v4 atlas 結構（尺寸/必要 frame/錨點/renderer 解析；無瀏覽器時略過像素檢查）
        run: node scripts/validate-v4-atlas.js
      - name: 驗證 JSON 可解析
        run: |
          node -e "JSON.parse(require('fs').readFileSync('art-config.json','utf8')); console.log('✓ art-config.json')"
          node -e "JSON.parse(require('fs').readFileSync('assets/manifest.json','utf8')); console.log('✓ assets/manifest.json')"
      - name: 語法檢查所有 JS
        run: |
          for f in src/*.js scripts/*.js; do node -c "$f" && echo "✓ $f"; done

  e2e:
    name: Stage 4–11 RPG 場景 E2E（真瀏覽器 + atlas 像素驗證）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: 安裝 playwright + chromium
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: 驗證 v4 atlas 像素品質（空白幀/作物觸邊，需 chromium）
        run: node scripts/validate-v4-atlas.js
      - name: 跑 Stage 4–11 RPG v4 E2E（大世界/camera/動作/故事鏈/探索/NPC對話/性別/動物照護/天氣視覺化/NPC委託/農場圖鑑/視覺/RWD/桌機+手機）
        run: node scripts/test-rpg-v4-e2e.js

  deploy:
    name: 部署 GitHub Pages
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - name: 上傳網站（repo 根目錄含 index.html / src / assets）
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
